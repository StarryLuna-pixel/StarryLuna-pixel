<svg width="100%" viewBox="0 0 680 260" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Pixel art banner: Hey, I'm Mrudula Shenoy</title>
<desc>A retro pixel art styled personal banner with dark background, pixel grid, and colorful text</desc>

<!-- Background -->
<rect width="680" height="260" fill="#0a0a1a"/>

<!-- Pixel grid overlay -->
<defs>
  <pattern id="pgrid" width="8" height="8" patternUnits="userSpaceOnUse">
    <rect width="8" height="8" fill="none" stroke="#ffffff" stroke-width="0.08" opacity="0.12"/>
  </pattern>
</defs>
<rect width="680" height="260" fill="url(#pgrid)"/>

<!-- Pixel wave decoration blocks at bottom -->
